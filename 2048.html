<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - 我的小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #faf8ef;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }

        h1 {
            font-size: 80px;
            color: #776e65;
            margin-bottom: 20px;
        }

        .score-container {
            background-color: #bbada0;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 20px;
        }

        #game-board {
            width: 400px;
            height: 400px;
            background-color: #bbada0;
            border-radius: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            padding: 10px;
        }

        .tile {
            background-color: #cdc1b4;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            color: #776e65;
        }

        /* 不同数字的样式 */
        .tile-2 { background-color: #eee4da; }
        .tile-4 { background-color: #ede0c8; }
        .tile-8 { background-color: #f2b179; color: white; }
        .tile-16 { background-color: #f59563; color: white; }
        .tile-32 { background-color: #f67c5f; color: white; }
        .tile-64 { background-color: #f65e3b; color: white; }
        .tile-128 { background-color: #edcf72; color: white; font-size: 28px; }
        .tile-256 { background-color: #edcc61; color: white; font-size: 28px; }
        .tile-512 { background-color: #edc850; color: white; font-size: 28px; }
        .tile-1024 { background-color: #edc53f; color: white; font-size: 20px; }
        .tile-2048 { background-color: #edc22e; color: white; font-size: 20px; }
        .tile-super { background-color: #3c3a32; color: white; font-size: 20px; }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(238, 228, 218, 0.73);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 48px;
            color: #776e65;
            font-weight: bold;
        }

        .restart-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #8f7a66;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 20px;
            cursor: pointer;
        }

        .restart-btn:hover {
            background-color: #776e65;
        }

        /* 适配手机 */
        @media (max-width: 450px) {
            #game-board {
                width: 300px;
                height: 300px;
            }
            .tile {
                font-size: 28px;
            }
            h1 {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <h1>2048</h1>
    <div class="score-container">得分: <span id="score">0</span></div>
    <div id="game-board"></div>
    <div class="game-over" id="gameOver">
        游戏结束!
        <button class="restart-btn" onclick="restartGame()">重新开始</button>
    </div>

    <script>
        // 游戏核心变量
        let board = [];
        let score = 0;
        const size = 4;
        const gameBoard = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOver');

        // 初始化游戏
        function initGame() {
            // 清空棋盘
            board = Array(size).fill().map(() => Array(size).fill(0));
            score = 0;
            scoreDisplay.textContent = score;
            gameOverScreen.style.display = 'none';
            
            // 生成两个初始数字
            generateRandomTile();
            generateRandomTile();
            
            // 渲染棋盘
            renderBoard();
        }

        // 生成随机数字（90%概率2，10%概率4）
        function generateRandomTile() {
            // 找空位置
            const emptyTiles = [];
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    if (board[i][j] === 0) {
                        emptyTiles.push({x: i, y: j});
                    }
                }
            }

            // 没有空位置则游戏结束
            if (emptyTiles.length === 0) {
                gameOver();
                return;
            }

            // 随机选一个空位置
            const randomTile = emptyTiles[Math.floor(Math.random() * emptyTiles.length)];
            board[randomTile.x][randomTile.y] = Math.random() < 0.9 ? 2 : 4;
        }

        // 渲染棋盘
        function renderBoard() {
            // 清空棋盘DOM
            gameBoard.innerHTML = '';
            
            // 生成每个格子
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    const tile = document.createElement('div');
                    tile.classList.add('tile');
                    
                    // 根据数字添加样式类
                    if (board[i][j] !== 0) {
                        tile.textContent = board[i][j];
                        tile.classList.add(`tile-${board[i][j]}`);
                        // 超大数字特殊类
                        if (board[i][j] > 2048) {
                            tile.classList.add('tile-super');
                        }
                    }
                    
                    gameBoard.appendChild(tile);
                }
            }
        }

        // 处理滑动逻辑（核心）
        function slide(row) {
            // 移除0
            let newRow = row.filter(num => num !== 0);
            
            // 合并相同数字
            for (let i = 0; i < newRow.length - 1; i++) {
                if (newRow[i] === newRow[i + 1]) {
                    newRow[i] *= 2;
                    score += newRow[i];
                    newRow.splice(i + 1, 1);
                }
            }
            
            // 补0
            while (newRow.length < size) {
                newRow.push(0);
            }
            
            return newRow;
        }

        // 向左滑动
        function moveLeft() {
            let moved = false;
            for (let i = 0; i < size; i++) {
                const originalRow = [...board[i]];
                const newRow = slide(originalRow);
                
                if (JSON.stringify(originalRow) !== JSON.stringify(newRow)) {
                    moved = true;
                    board[i] = newRow;
                }
            }
            
            if (moved) {
                generateRandomTile();
                renderBoard();
                scoreDisplay.textContent = score;
                checkGameOver();
            }
        }

        // 向右滑动
        function moveRight() {
            let moved = false;
            for (let i = 0; i < size; i++) {
                const originalRow = [...board[i]];
                // 反转数组，向左滑动，再反转回来
                const reversedRow = originalRow.reverse();
                const newRow = slide(reversedRow).reverse();
                
                if (JSON.stringify(originalRow) !== JSON.stringify(newRow)) {
                    moved = true;
                    board[i] = newRow;
                }
            }
            
            if (moved) {
                generateRandomTile();
                renderBoard();
                scoreDisplay.textContent = score;
                checkGameOver();
            }
        }

        // 向上滑动
        function moveUp() {
            let moved = false;
            for (let j = 0; j < size; j++) {
                // 提取列
                const column = [];
                for (let i = 0; i < size; i++) {
                    column.push(board[i][j]);
                }
                
                const originalColumn = [...column];
                const newColumn = slide(column);
                
                // 放回列
                if (JSON.stringify(originalColumn) !== JSON.stringify(newColumn)) {
                    moved = true;
                    for (let i = 0; i < size; i++) {
                        board[i][j] = newColumn[i];
                    }
                }
            }
            
            if (moved) {
                generateRandomTile();
                renderBoard();
                scoreDisplay.textContent = score;
                checkGameOver();
            }
        }

        // 向下滑动
        function moveDown() {
            let moved = false;
            for (let j = 0; j < size; j++) {
                // 提取列
                const column = [];
                for (let i = 0; i < size; i++) {
                    column.push(board[i][j]);
                }
                
                const originalColumn = [...column];
                // 反转列，向左滑动，再反转回来
                const reversedColumn = column.reverse();
                const newColumn = slide(reversedColumn).reverse();
                
                // 放回列
                if (JSON.stringify(originalColumn) !== JSON.stringify(newColumn)) {
                    moved = true;
                    for (let i = 0; i < size; i++) {
                        board[i][j] = newColumn[i];
                    }
                }
            }
            
            if (moved) {
                generateRandomTile();
                renderBoard();
                scoreDisplay.textContent = score;
                checkGameOver();
            }
        }

        // 检查游戏是否结束
        function checkGameOver() {
            // 检查是否有空位
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    if (board[i][j] === 0) return;
                }
            }
            
            // 检查是否有可合并的数字
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    const current = board[i][j];
                    // 检查右边
                    if (j < size - 1 && current === board[i][j + 1]) return;
                    // 检查下边
                    if (i < size - 1 && current === board[i + 1][j]) return;
                }
            }
            
            // 没有空位也没有可合并的，游戏结束
            gameOver();
        }

        // 游戏结束
        function gameOver() {
            gameOverScreen.style.display = 'flex';
        }

        // 重新开始游戏
        function restartGame() {
            initGame();
        }

        // 监听键盘事件
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowLeft':
                    moveLeft();
                    break;
                case 'ArrowRight':
                    moveRight();
                    break;
                case 'ArrowUp':
                    moveUp();
                    break;
                case 'ArrowDown':
                    moveDown();
                    break;
            }
        });

        // 移动端触摸支持（可选，加了更好）
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            
            // 判断滑动方向（优先水平）
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 20) moveRight();
                else if (diffX < -20) moveLeft();
            } else {
                if (diffY > 20) moveDown();
                else if (diffY < -20) moveUp();
            }
        });

        // 初始化游戏
        window.onload = initGame;
    </script>
</body>
</html>
